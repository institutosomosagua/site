<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" fill="none">
  <!-- Water drop -->
  <defs>
    <radialGradient id="dropGrad" cx="42%" cy="35%" r="58%">
      <stop offset="0%" stop-color="#7DE8F5"/>
      <stop offset="55%" stop-color="#1BBAD6"/>
      <stop offset="100%" stop-color="#0A7A96"/>
    </radialGradient>
    <radialGradient id="rippleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1BBAD6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0A7A96" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ripple rings -->
  <ellipse cx="45" cy="72" rx="32" ry="7" stroke="#1BBAD6" stroke-width="1.2" stroke-opacity="0.55" fill="none"/>
  <ellipse cx="45" cy="72" rx="22" ry="5" stroke="#1BBAD6" stroke-width="1.4" stroke-opacity="0.75" fill="none"/>
  <ellipse cx="45" cy="72" rx="12" ry="3" stroke="#1BBAD6" stroke-width="1.6" stroke-opacity="0.9" fill="none"/>

  <!-- Drop shadow/glow -->
  <ellipse cx="45" cy="68" rx="16" ry="5" fill="#0A7A96" fill-opacity="0.35"/>

  <!-- Water drop body -->
  <path d="M45 8 C45 8 22 36 22 52 C22 64.6 32.4 74 45 74 C57.6 74 68 64.6 68 52 C68 36 45 8 45 8Z" fill="url(#dropGrad)"/>

  <!-- Highlight -->
  <ellipse cx="38" cy="40" rx="5" ry="9" fill="white" fill-opacity="0.35" transform="rotate(-18 38 40)"/>

  <!-- Text: SOMOS ÁGUA -->
  <text x="88" y="46" font-family="'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif"
        font-size="26" font-weight="700" font-style="italic" fill="white" letter-spacing="1.5">
    Somos Água
  </text>

  <!-- Text: INSTITUTO -->
  <text x="91" y="66" font-family="'Gill Sans', 'Optima', 'Trebuchet MS', sans-serif"
        font-size="11.5" font-weight="400" fill="white" fill-opacity="0.75" letter-spacing="5.5">
    INSTITUTO
  </text>
</svg>
